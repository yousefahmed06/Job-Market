name: Fetch RemoteOK Jobs

on:
  schedule:
    # Runs every 6 hours. Adjust as needed -- more frequent runs = more
    # snapshots = faster growth toward a larger row count.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch_jobs.py
        run: python fetch_jobs.py

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs_data.csv
          git diff --quiet --cached || git commit -m "Add job snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
