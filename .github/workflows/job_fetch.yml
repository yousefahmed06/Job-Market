name: Fetch Job Postings

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours, UTC — edit to change frequency
  workflow_dispatch:          # lets you trigger it manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can push the updated CSV back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job fetch script
        run: python fetch_jobs.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs_data.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Update job postings $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
